<!DOCTYPE html>
<html>
	<head>
		<title>PERUDO</title>
		<link rel="stylesheet" type="text/css" href="css/style.css">
    	<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script src="https://use.fontawesome.com/8f24d4fb11.js"></script>
	</head>
	<body>
		<div id="container">
			<div id="infobar">
				<i class="fa fa-question-circle" aria-hidden="true"></i>
			</div>
			<div id="dicecontainer">
				<img class="die die1" src="img/default.png">
				<img class="die die2" src="img/default.png">
				<img class="die die3" src="img/default.png">
				<img class="die die4" src="img/default.png">
				<img class="die die5" src="img/default.png">
			</div>
			<div id="menu">
				<div class="button roll" onClick=" assignDieNumber(); rollDice()">roll</div>
				<div class="button remove" onClick="remove(); assignDieNumber(); resetFaces()">remove</div>
				<div class="button add disabled"  onClick="tryToAdd(); assignDieNumber(); resetFaces()">add</div>
				<div class="button reset" onClick="reset()">reset</div>
			</div>
		</div>

		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>	
		<script src="js/script.js"></script>	
	</body>
</html>

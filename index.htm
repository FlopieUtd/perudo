<!DOCTYPE html>
<html>
	<head>
		<title>PERUDO</title>
		<link rel="stylesheet" type="text/css" href="css/style.css">
    	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
		<div id="dicecontainer">
			<img class="die die1" src="img/default.png">
			<img class="die die2" src="img/default.png">
			<img class="die die3" src="img/default.png">
			<img class="die die4" src="img/default.png">
			<img class="die die5" src="img/default.png">
		</div>
		<div id="menu">
			<div class="button roll" 		onClick="assignDieNumber(); rollDice()">roll</div>
			<div class="button removedie" 		onClick="removeDie(); assignDieNumber(); resetFaces()">remove</div>
			<div class="button add"  		onClick="tryToAddDie(); assignDieNumber(); resetFaces()">add</div>
			<div class="button reset" 		onClick="resetDice()">reset</div>

		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>	
		<script src="js/script.js"></script>	
	</body>
</html>
